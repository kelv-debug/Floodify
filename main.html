<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floodify</title>
    <link rel="icon" href="https://github.com/kelv-debug/Floodify/blob/main/logo1-removebg-preview.png?raw=true">

    <style>
        body {
            /* Grey Background Gradient */
            background: linear-gradient(168deg, rgba(217, 217, 217, 1) 0%, rgba(105, 105, 105, 1) 100%);

        }

        .top-panel-container {
            display: flex;
            justify-content: top;
            flex-direction: column;
            align-items: top;
            height: 100vh;

        }

        .logo {
            /* FLOODIFY Logo Text */
            margin-left: 20px;
            color: rgb(104, 104, 104);
            font-family: fantasy;
            font-size: 50px;
            display: flex;
            text-shadow: 0px 1px 2px rgba(0, 0, 0, 0.2);

            /* Glassmorphism Effect */
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);/ border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 8px 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.15);
            width: fit-content;
        }


        #F {
            /* F in FLOODIFY */
            color: rgb(139, 139, 139);
            font-family: fantasy;
        }

        .top-line {
            /* line under FLOODIFY */
            border: none;
            height: 4px;
            background-color: #797979;
            width: 100%;
            margin: 15px auto;
        }
    </style>
</head>

<body>
    <div class="top-panel-container">
        <div class="logo">
            <p1 id="F">F</p1>
            <p2>LOODIFY</p2>
        </div>
        <hr class="top-line">
    </div>

    <div class="LANDING-PAGE-container">
        <p3></p3>

    </div>

</body>

</html>
